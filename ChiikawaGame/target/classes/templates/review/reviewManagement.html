<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>評論總覽</title>
<link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{layout/saHeader}"></div>
    <div class="container mt-4">
        <div class="mb-4">
            <h2>查詢評論</h2>
            <input type="text" id="searchInput" class="form-control"
                   placeholder="輸入評論資料來查詢" onkeyup="searchReview()">
        </div>

        <div class="mb-4">
            <h2>評論列表</h2>
            <!-- 垂直置中style="vertical-align: middle;" -->
            <table id="rvwTable" class="table table-striped">
                <thead>
                    <tr>
                        <th style="width:10%">評論ID</th>
                        <th style="width:10%">訂單編號</th>
                        <th style="width:8%">評論日期</th>
                        <th style="width:8%">商品圖片</th>
                        <th class="col-3">評論內容</th>
                        <th>評分</th>
                        <th style="width:10%">評論者</th>
                        <th>顯示狀態</th>
                        <th colspan="2">操作</th>
                    </tr>
                </thead>
                <tbody id="rvwTableBody" class="table table-striped">
                    <!-- 資料將通過 JavaScript 動態插入 -->
                </tbody>
            </table>

            <ul class="pagination">
                <!-- 上一頁按鈕 -->
                <th:block th:switch="${ page.number+1 == 1 }">
                    <li th:case="${false}" class="page-item">
                        <a th:href="@{/review/reviewManagement(p=${page.number})}" class="page-link">上一頁</a>
                    </li>
                    <li th:case="${true}" class="page-item disabled"><span class="page-link">在第一頁</span></li>
                </th:block>
                <!-- 頁數按鈕 -->
                <th:block th:each=" onePageNum : ${#numbers.sequence(1, page.totalPages)}">
                    <th:block th:switch="${ onePageNum == page.number+1 }">
                        <li th:case="${true}" class="page-item active">
                            <span class="page-link">[[ ${onePageNum} ]]</span>
                        </li>
                        <li th:case="${false}" class="page-item">
                            <a class="page-link" th:href="@{/review/reviewManagement(p=${onePageNum})}">[[ ${onePageNum} ]]</a>
                        </li> 
                    </th:block>
                </th:block>
                <!-- 下一頁按鈕 -->
                <th:block th:switch="${ page.number+1 == page.totalPages }">
                    <li th:case="${false}" class="page-item"><a th:href="@{/review/reviewManagement(p=${page.number + 2})}" class="page-link">下一頁</a></li>
                    <li th:case="${true}" class="page-item disabled"><span class="page-link">在最後一頁</span></li>
                </th:block>
            </ul>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        // 加載評論
        function loadReviews(pageNumber = 1) {
            $.ajax({
                url: `/api/reviews?p=${pageNumber}`,
                type: 'GET',
                dataType: 'json',
                success: function(data) {
                    const reviews = data.content; // 取得 Page 物件中的 content
                    const tbody = $('#rvwTableBody');
                    tbody.empty(); // 清空表格內容
    
                    reviews.forEach(review => {
                        tbody.append(`
                            <tr>
                                <td>${review.reviewId}</td>
                                <td>${review.reviewOrderId}</td>
                                <td>${new Date(review.reviewDate).toLocaleString('zh-TW')}</td>
                                <td><img src="/reviewimgs/${review.reviewImg}" alt="評論圖片" style="width:100px;"></td>
                                <td>
                                    <textarea class="form-control" style="height: 80px; resize: none;" readonly>${review.reviewComment}</textarea>
                                </td>
                                <td>${review.revieweValuation}</td>
                                <td>${review.reviewer}</td>
                                <td>${review.reviewStatus == 1 ? '顯示' : '隱藏'}</td>
                                <td>
                                    <select class="form-select review-status" data-id="${review.reviewId}">
                                        <option value="" disabled selected>請選擇狀態</option>
                                        <option value="1" selected}>顯示</option>
                                        <option value="0" selected}>隱藏</option>
                                    </select>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-outline-success" onclick="updateReviewStatus(${review.reviewId})">更新</button>
                                </td>
                            </tr>
                        `);
                    });
                },
                error: function(err) {
                    console.error("Error loading reviews:", err);
                }
            });
        }
    
        // 更新評論狀態
        function updateReviewStatus(reviewId) {
            const selectedStatus = $(`.review-status[data-id="${reviewId}"]`).val();

            if (selectedStatus === "") {
                alert("請選擇有效的狀態！");
                return;
            }

            $.ajax({
                url: '/review/updateStatus',
                type: 'POST',
                data: {
                    id: reviewId,
                    status: selectedStatus
                },
                success: function(response) {
                    alert(response); // 顯示更新成功的訊息
                    loadReviews(); // 重新載入評論列表
                },
                error: function(err) {
                    console.error("Error updating review status:", err);
                    alert("更新失敗，請稍後再試！");
                }
            });
        }
    
        // 初次載入評論
        $(document).ready(function() {
            loadReviews();
        });
    </script>
</body>
</html>
